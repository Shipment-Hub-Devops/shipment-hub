# Ansible inventory for ShipmentHub deployment.
# Replace the IP below with the `vm_public_ip` output from Terraform:
#   cd ../terraform && terraform output vm_public_ip
[web]
shipment-hub-vm ansible_host=REPLACE_WITH_VM_PUBLIC_IP

[web:vars]
ansible_user=azureadmin
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
