---
# Configure the ShipmentHub VM: install Docker + Docker Compose and prepare
# the host to run the application. Run with:
#   ansible-playbook -i inventory.ini playbook.yml
- name: Configure ShipmentHub server
  hosts: web
  become: true

  vars:
    docker_users:
      - "{{ ansible_user }}"

  tasks:
    # ---------------------------------------------------------------
    # System packages
    # ---------------------------------------------------------------
    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        upgrade: safe

    - name: Install prerequisite packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
        state: present

    # ---------------------------------------------------------------
    # Docker Engine + Compose plugin (official Docker repository)
    # https://docs.docker.com/engine/install/ubuntu/
    # ---------------------------------------------------------------
    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add users to the docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"

    # ---------------------------------------------------------------
    # Application directory
    # ---------------------------------------------------------------
    - name: Create application directory
      ansible.builtin.file:
        path: /opt/shipment-hub
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
