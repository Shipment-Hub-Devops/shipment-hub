# CI Pipeline for ShipmentHub
# Runs automatically on every push to feature branches and on PRs targeting main
name: CI Pipeline

on:
  # Trigger on pushes to any branch except main
  push:
    branches-ignore:
      - main
  # Trigger on pull requests targeting main
  pull_request:
    branches:
      - main

jobs:
  # Backend job: validates the Express API in the api/ folder
  backend:
    runs-on: ubuntu-latest

    # Runs the tests on both Node 18 and Node 20 at the same time
    strategy:
      matrix:
        node-version: [18, 20]

    # Start a PostgreSQL service for tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: shipmenthub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        # Set the  working directory to api folder for all steps of the workflow since this is the backend job
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js version based on the matrix configuration, and cache npm dependencies for faster builds
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      
      # this instaslls the dependencies from package-lock.json without changing them
      - name: Install dependencies
        run: npm ci
      
      # Verifies that the Dockerfile builds sucessfully from the project root 
      - name: Build Docker image
        run: docker build -t shipmenthub-api:ci -f ../Dockerfile ..
      
      # Checks that the test suite is working correctly 
      - name: Run one focused test
        run: npm test -- tests/tracking.test.js
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/shipmenthub_test
          NODE_ENV: test
      
      # Fail pipeline if they are any linting errors
      - name: Run linting
        run: npm run lint

      # Fail pipeline if any tests fail, but still runs the linting and other steps
      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/shipmenthub_test
          NODE_ENV: test

