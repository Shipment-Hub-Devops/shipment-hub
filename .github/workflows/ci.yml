# CI Pipeline for ShipmentHub
# Runs automatically on every push to feature branches and on PRs targeting main
name: CI Pipeline

on:
  # Only run on feature branches, not directly on main
  push:
    branches-ignore:
      - main
  # Also run when someone opens a PR targeting main
  pull_request:
    branches:
      - main

jobs:
  # Validates the Express API: linting, tests, and Docker build
  backend:
    runs-on: ubuntu-latest

    # Test against both Node 18 and 20 to catch version-specific issues
    strategy:
      matrix:
        node-version: [18, 20]

    # Spin up a real Postgres instance so the tests have a database to talk to
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: shipmenthub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        # All steps run inside the api/ folder
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Pick the Node version from the matrix above
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      # Use npm ci instead of npm install to respect the lockfile exactly
      - name: Install dependencies
        run: npm ci

      # Make sure the Dockerfile still builds before running any tests
      - name: Build Docker image
        run: docker build -t shipmenthub-api:ci -f ../Dockerfile ..

      # Quick sanity check: just the tracking tests to catch obvious breakage early
      - name: Run one focused test
        run: npm test -- tests/tracking.test.js
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/shipmenthub_test
          NODE_ENV: test

      # Block the pipeline if there are any linting errors
      - name: Run linting
        run: npm run lint

      # Run the full test suite ;pipeline fails if anything breaks
      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/shipmenthub_test
          NODE_ENV: test

  # Scans npm packages for known vulnerabilities
  dependency-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Audit the api dependencies specifically
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Only fail on high or critical severity : moderate issues are logged but don't block
      - name: Run npm audit
        run: npm audit --audit-level=high

  # Scans the Docker image for OS and package vulnerabilities using Trivy
  image-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build fresh so we're scanning exactly what would go to production
      - name: Build Docker image
        run: docker build -t shipmenthub-api:scan -f Dockerfile .

      # Trivy checks every layer of the image : fails only on HIGH or CRITICAL findings
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'shipmenthub-api:scan'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

