# CI Pipeline for ShipmentHub
# Runs automatically on every push to feature branches and on PRs targeting main
name: CI Pipeline

on:
  # Trigger on pushes to any branch except main
  push:
    branches-ignore:
      - main
  # Trigger on pull requests targeting main
  pull_request:
    branches:
      - main

jobs:
  # Backend job: validates the Express API in the api/ folder
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Set working directory to api folder for all steps
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js 18 to match the project's engine requirement
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      # Fail pipeline if linting errors are found
      - name: Run linting
        run: npm run lint

      # Fail pipeline if any test fails
      - name: Run tests
        run: npm test

  # Frontend job: validates the Next.js app in the web/ folder
  frontend:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        # Set working directory to web folder for all steps
        working-directory: ./web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # --legacy-peer-deps needed due to react-leaflet v5 requiring React 19
      # while the project uses React 18
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Fail pipeline if linting errors are found
      - name: Run linting
        run: npm run lint