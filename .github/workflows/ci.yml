# CI Pipeline for ShipmentHub
# Runs automatically on every push to feature branches and on PRs targeting main
name: CI Pipeline

on:
  # Trigger on pushes to any branch except main
  push:
    branches-ignore:
      - main
  # Trigger on pull requests targeting main
  pull_request:
    branches:
      - main

jobs:
  # Backend job: validates the Express API in the api/ folder
  backend:
    runs-on: ubuntu-latest

    # Start a PostgreSQL service for tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: shipmenthub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        # Set working directory to api folder for all steps
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js 20 to match GitHub Actions runner
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      #Build docker image for the API service to ensure it builds correctly
      - name: Build Docker image
        run: docker build -t shipmenthub-api:ci ./

      #Runs a focused test to ensure the test suite is working correctly
      - name: Run one focused test
        run: npm test -- tests/tracking.test.js
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/shipmenthub_test
          NODE_ENV: test

      # Fail pipeline if linting errors are found
      - name: Run linting
        run: npm run lint

      # Fail pipeline if any test fails
      - name: Run full test suite
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shipmenthub_test
          NODE_ENV: test

